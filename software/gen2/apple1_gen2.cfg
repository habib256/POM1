# cc65 linker config for Apple 1 + GEN2 Color Graphics Card
#
# Memory layout:
#   $0000-$001F  Zero page (32 bytes)
#   $0280-$1FFF  Code + read-only data (7552 bytes, output file)
#   $2000-$3FFF  GEN2 HGR framebuffer - RESERVED, do not use
#   $4000-$9FFF  BSS / runtime data (24 KB, not in output file)

MEMORY {
    ZP:     start = $0000, size = $0020, type = rw, define = yes;
    CODE:   start = $0280, size = $1D80, type = ro, define = yes, file = %O;
    BSS:    start = $4000, size = $6000, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    RODATA:   load = CODE, type = ro;
    BSS:      load = BSS,  type = bss;
}
